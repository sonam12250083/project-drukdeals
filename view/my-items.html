<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Druk Deals – My Listings</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="nav-brand" href="/home">Druk<span>Deals</span></a>
    <div class="nav-links">
      <a href="/home">Browse</a>
      <a href="/my-items" class="active">My Listings</a>
      <a href="/add-item" class="btn-nav-sell">+ Sell Item</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">U</div>
      <span id="userName"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="my-items-page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px">
      <div>
        <h2 style="margin-bottom:4px">My Listings</h2>
        <p style="color:var(--stone);font-size:0.95rem">Items you have listed for sale</p>
      </div>
      <a href="/add-item" class="btn btn-primary" style="width:auto">+ Post New Item</a>
    </div>

    <div id="myProducts">
      <!-- Loaded by JS -->
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/product.js"></script>
  <script>
    // Redirect if not logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('user_id')) {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
