<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Druk Deals – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <!-- Brand Side -->
    <div class="auth-brand">
      <div class="brand-logo">Druk<span>Deals</span></div>
      <div class="brand-tagline">
        Bhutan's trusted second-hand marketplace. Buy and sell preloved items in your community.
      </div>
      <div class="brand-deco">
        <div class="deco-line"></div>
        <div class="deco-line"></div>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="auth-form-box">
        <h2>Welcome back</h2>
        <p class="sub">Sign in to your account to continue</p>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="login()">Login</button>

        <div class="auth-switch">
          Don't have an account? <a href="/signup-page">Sign up here</a>
        </div>

        <div class="auth-switch" style="margin-top:12px">
          <a href="/home" style="color:var(--stone)">Browse without logging in →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
